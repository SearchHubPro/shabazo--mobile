<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>写バ像 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; 
        }
        
        /* 全画面ではなく、カメラ本来の4:3比率を維持する枠 */
        #app-wrapper {
            position: relative;
            width: 100vw;
            height: calc(100vw * 4 / 3);
            max-height: 100vh;
            max-width: calc(100vh * 3 / 4);
            background: #111;
            overflow: hidden;
        }
        #video { width: 100%; height: 100%; object-fit: contain; }
        
        /* 枠のサイズに合わせてUIを強制横向き展開 */
        #ui-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            pointer-events: none;
        }

        #board-ui {
            position: absolute; bottom: 3%; left: 3%;
            width: 35%; aspect-ratio: 4 / 3;
            background: #0f4c3a; color: #fff;
            border: 2px solid #fff; padding: 4px; box-sizing: border-box;
            display: flex; flex-direction: column;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5); pointer-events: auto;
        }
        .board-white { background: #fff !important; color: #333 !important; border-color: #333 !important; }
        
        .board-row { display: flex; height: 20%; border: 1px solid; border-color: inherit; border-bottom: none; align-items: center; }
        .board-row:nth-child(3) { border-bottom: 1px solid; border-color: inherit; }
        .label { width: 30%; height: 100%; display: flex; justify-content: center; align-items: center; border-right: 1px solid; border-color: inherit; font-size: clamp(10px, 2.5vh, 16px); font-weight: bold; }
        .val { flex: 1; padding-left: 8px; font-size: clamp(12px, 3vh, 20px); font-weight: bold; overflow: hidden; white-space: nowrap; }
        .memo-space { flex: 1; display: flex; justify-content: center; align-items: center; font-size: clamp(16px, 4vh, 26px); font-weight: bold; }

        #btn-capture {
            position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
            width: 76px; height: 76px; background: rgba(255,255,255,0.3);
            border: 4px solid white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; pointer-events: auto;
        }
        #btn-capture .inner-circle { width: 60px; height: 60px; background: white; border-radius: 50%; transition: 0.1s; }
        #btn-capture:active .inner-circle { background: #e53e3e; transform: scale(0.9); }

        #btn-settings {
            position: absolute; left: 5%; top: 5%;
            width: 50px; height: 50px; background: rgba(0,0,0,0.6); color: white;
            border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; font-size: 24px;
            display: flex; justify-content: center; align-items: center; cursor: pointer; pointer-events: auto;
        }

        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; pointer-events: auto;
        }
        .modal-content { background: #222; width: 90%; max-width: 450px; border-radius: 12px; padding: 20px; box-sizing: border-box; }
        label { display: block; font-size: 13px; color: #a0aec0; margin-bottom: 4px; font-weight: bold; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #4a5568; border-radius: 6px; font-size: 15px; background: #333; color: #fff; box-sizing: border-box; font-weight: bold; }
        .btn-modal { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; background: #3182ce; color: white; margin-top: 20px; }
        
        #confirm-img { width: 100%; max-height: 60vh; object-fit: contain; border: 2px solid #555; border-radius: 4px; margin-bottom: 20px; }
        .confirm-actions { display: flex; gap: 15px; }
        .btn-half { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; text-align: center; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <video id="video" autoplay playsinline></video>
    <div id="ui-layer">
        <div id="board-ui" class="board-green">
            <div class="board-row"><div class="label">工事名</div><div class="val" id="v-site">金田ビル</div></div>
            <div class="board-row"><div class="label">工 種</div><div class="val" id="v-process">防水工事</div></div>
            <div class="board-row"><div class="label" id="lbl-loc">測 点</div><div class="val" id="v-loc">バルコニー</div></div>
            <div class="memo-space" id="v-memo">施工前</div>
        </div>
        <div id="btn-capture" onclick="takePhoto()"><div class="inner-circle"></div></div>
        <div id="btn-settings" onclick="openSettings()"><i class="fas fa-cog"></i></div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:#fff; margin-top:0;">看板設定</h3>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>レイアウト</label>
                <select id="tmpl" onchange="updateBoard()">
                    <option value="1">標準 (測点)</option>
                    <option value="2">日付入り</option>
                </select>
            </div>
            <div style="flex:1;">
                <label>カラー</label>
                <select id="b-color" onchange="updateBoard()">
                    <option value="green">深緑 (白字)</option>
                    <option value="white">白 (黒字)</option>
                </select>
            </div>
        </div>
        <label>工事名</label><input type="text" id="in-site" value="金田ビル" oninput="updateBoard()">
        <label>工種</label><input type="text" id="in-process" value="防水工事" oninput="updateBoard()">
        <label id="lbl-input-loc">測点 / 撮影日</label><input type="text" id="in-loc" value="バルコニー" oninput="updateBoard()">
        <label>特記事項</label><input type="text" id="in-memo" value="施工前" oninput="updateBoard()">
        <button class="btn-modal" onclick="closeSettings()">完了</button>
    </div>
</div>

<div id="confirm-modal" class="modal">
    <div class="modal-content" style="background:transparent; padding:0; display:flex; flex-direction:column; align-items:center;">
        <img id="confirm-img" src="">
        <div class="confirm-actions" style="width:100%;">
            <button class="btn-half" style="background: #4a5568;" onclick="cancelPhoto()">撮り直す</button>
            <button class="btn-half" style="background: #3182ce;" onclick="savePhoto()">保存する</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    let capturedBlob = null;

    // 枠に合わせてUI層の縦横サイズをジャストフィットさせる
    function resizeUI() {
        const wrapper = document.getElementById('app-wrapper');
        const ui = document.getElementById('ui-layer');
        ui.style.width = wrapper.clientHeight + 'px';
        ui.style.height = wrapper.clientWidth + 'px';
    }
    window.addEventListener('resize', resizeUI);
    document.addEventListener('DOMContentLoaded', resizeUI);

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            video.srcObject = stream;
        } catch(e) { alert("カメラが起動できません"); }
    }

    function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

    function updateBoard() {
        const t = document.getElementById('tmpl').value;
        const c = document.getElementById('b-color').value;
        const dStr = new Date().toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric'});

        document.getElementById('v-site').innerText = document.getElementById('in-site').value;
        document.getElementById('v-process').innerText = document.getElementById('in-process').value;
        document.getElementById('v-memo').innerText = document.getElementById('in-memo').value;

        if(t === "1") {
            document.getElementById('lbl-loc').innerText = "測 点";
            document.getElementById('lbl-input-loc').innerText = "測点";
            document.getElementById('v-loc').innerText = document.getElementById('in-loc').value;
            document.getElementById('in-loc').style.display = 'block';
        } else {
            document.getElementById('lbl-loc').innerText = "撮影日";
            document.getElementById('lbl-input-loc').innerText = "撮影日 (自動)";
            document.getElementById('v-loc').innerText = dStr;
            document.getElementById('in-loc').style.display = 'none';
        }
        document.getElementById('board-ui').className = c === 'green' ? 'board-green' : 'board-white';
    }

    function takePhoto() {
        const c = document.createElement('canvas');
        c.width = 1440;
        c.height = 1080;
        const ctx = c.getContext('2d');
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        // 映像が縦の場合、+90度回転させて完璧な横長写真に変換 (逆さバグ修正済)
        if (vw < vh) {
            ctx.translate(c.width / 2, c.height / 2);
            ctx.rotate(90 * Math.PI / 180); 
            ctx.drawImage(video, -vh / 2, -vw / 2, vh, vw);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
        } else {
            ctx.drawImage(video, 0, 0, c.width, c.height);
        }

        const isGreen = document.getElementById('b-color').value === 'green';
        const bw = 1440 * 0.35;
        const bh = bw * 0.75;
        const bx = 1440 * 0.03;
        const by = 1080 - bh - 1080 * 0.03;
        const p = 6;

        ctx.fillStyle = isGreen ? '#0f4c3a' : '#ffffff';
        ctx.fillRect(bx, by, bw, bh);
        ctx.lineWidth = p;
        ctx.strokeStyle = isGreen ? '#ffffff' : '#333333';
        ctx.strokeRect(bx + p, by + p, bw - p*2, bh - p*2);

        ctx.fillStyle = isGreen ? '#ffffff' : '#333333';
        const rh = (bh - p*2) * 0.2;
        const cw = (bw - p*2) * 0.3;
        const labels = ['工事名', '工 種', document.getElementById('lbl-loc').innerText];
        const vals = [
            document.getElementById('v-site').innerText,
            document.getElementById('v-process').innerText,
            document.getElementById('v-loc').innerText
        ];
        const memo = document.getElementById('v-memo').innerText;

        for(let i=0; i<3; i++) {
            const ry = by + p + i*rh;
            ctx.strokeRect(bx + p, ry, cw, rh);
            ctx.strokeRect(bx + p + cw, ry, (bw - p*2) - cw, rh);
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.font = `bold ${rh * 0.45}px sans-serif`;
            ctx.fillText(labels[i], bx + p + cw/2, ry + rh/2);
            ctx.textAlign = 'left';
            ctx.font = `bold ${rh * 0.55}px sans-serif`;
            ctx.fillText(vals[i], bx + p + cw + 10, ry + rh/2);
        }

        if(memo) {
            ctx.textAlign = 'center';
            ctx.font = `bold ${rh * 0.9}px sans-serif`;
            ctx.fillText(memo, bx + bw/2, by + p + rh*3 + ((bh - p*2) - rh*3)/2);
        }

        document.getElementById('confirm-img').src = c.toDataURL('image/jpeg', 0.9);
        document.getElementById('confirm-modal').style.display = 'flex';
        c.toBlob(b => capturedBlob = b, 'image/jpeg', 0.9);
    }

    function cancelPhoto() { document.getElementById('confirm-modal').style.display = 'none'; capturedBlob = null; }

    async function savePhoto() {
        if(!capturedBlob) return;
        const filename = `写バ像_${Date.now()}.jpg`;
        if (navigator.share && navigator.canShare) {
            try {
                const file = new File([capturedBlob], filename, { type: 'image/jpeg' });
                if (navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file] });
                    cancelPhoto(); return;
                }
            } catch (e) { if (e.name === 'AbortError') return; }
        }
        const a = document.createElement('a');
        a.href = document.getElementById('confirm-img').src;
        a.download = filename;
        a.click();
        cancelPhoto();
    }

    document.addEventListener('DOMContentLoaded', () => { startCamera(); updateBoard(); });
</script>
</body>
</html>
